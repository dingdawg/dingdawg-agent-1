<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded square background — matches DingDawg dark theme -->
  <rect width="512" height="512" rx="112" ry="112" fill="#07111c"/>

  <!-- Gold accent border ring (subtle) -->
  <rect x="12" y="12" width="488" height="488" rx="104" ry="104" fill="none" stroke="#F5A623" stroke-width="8" opacity="0.25"/>

  <!-- Dog head centered in the icon -->

  <!-- Head base (large) -->
  <ellipse cx="256" cy="240" rx="130" ry="120" fill="#F5A623"/>

  <!-- Left ear (floppy, hangs down) -->
  <ellipse cx="148" cy="195" rx="52" ry="80" fill="#D4880A" transform="rotate(-15 148 195)"/>

  <!-- Right ear (floppy, hangs down) -->
  <ellipse cx="364" cy="195" rx="52" ry="80" fill="#D4880A" transform="rotate(15 364 195)"/>

  <!-- Forehead highlight -->
  <ellipse cx="256" cy="195" rx="90" ry="70" fill="#F5A623"/>

  <!-- Snout / muzzle area -->
  <ellipse cx="256" cy="295" rx="75" ry="55" fill="#D4880A"/>

  <!-- Nose -->
  <ellipse cx="256" cy="270" rx="30" ry="22" fill="#1a0a00"/>

  <!-- Nose highlight -->
  <ellipse cx="246" cy="264" rx="8" ry="6" fill="#3A1E00" opacity="0.5"/>

  <!-- Left eye -->
  <circle cx="205" cy="215" r="28" fill="#1a0a00"/>
  <circle cx="205" cy="215" r="20" fill="#3A1E00"/>
  <circle cx="196" cy="207" r="8" fill="#FFFFFF"/>

  <!-- Right eye -->
  <circle cx="307" cy="215" r="28" fill="#1a0a00"/>
  <circle cx="307" cy="215" r="20" fill="#3A1E00"/>
  <circle cx="298" cy="207" r="8" fill="#FFFFFF"/>

  <!-- Mouth — happy curve -->
  <path d="M220 328 Q256 360 292 328" stroke="#1a0a00" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="256" cy="350" rx="22" ry="18" fill="#E85D75"/>
  <line x1="256" y1="340" x2="256" y2="362" stroke="#C44060" stroke-width="4" stroke-linecap="round"/>

  <!-- Cheek blush (subtle) -->
  <ellipse cx="175" cy="270" rx="25" ry="15" fill="#E8855A" opacity="0.3"/>
  <ellipse cx="337" cy="270" rx="25" ry="15" fill="#E8855A" opacity="0.3"/>

  <!-- Gold paw accent at bottom -->
  <circle cx="256" cy="440" r="12" fill="#F5A623" opacity="0.7"/>
  <circle cx="224" cy="428" r="8" fill="#F5A623" opacity="0.5"/>
  <circle cx="288" cy="428" r="8" fill="#F5A623" opacity="0.5"/>
</svg>
