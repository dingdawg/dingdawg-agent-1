# DingDawg Agent 1 — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# ---------------------------------------------------------------------------------

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./isg_agent:/app/isg_agent:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - agent-data:/app/data
    command:
      [
        "python", "-m", "uvicorn",
        "isg_agent.app:create_app",
        "--factory",
        "--host", "0.0.0.0",
        "--port", "8900",
        "--reload",
        "--reload-dir", "/app/isg_agent",
      ]
    environment:
      - ISG_AGENT_LOG_LEVEL=DEBUG

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    environment:
      - BACKEND_URL=http://backend:8900

volumes:
  agent-data:
