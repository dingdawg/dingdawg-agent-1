[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
# SQLite requires exactly 1 Uvicorn worker — multiple workers cause DB write-lock contention
ISG_AGENT_WORKERS = "1"
