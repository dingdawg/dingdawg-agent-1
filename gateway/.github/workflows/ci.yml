name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------
  # Job 1: Backend — lint + type-check + test (2226+ tests must pass)
  # -------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # ── Required secrets (set in GitHub repo Settings → Secrets) ────
      # ISG_AGENT_OPENAI_API_KEY        → GitHub secret
      # ISG_AGENT_ANTHROPIC_API_KEY     → GitHub secret
      # ISG_AGENT_STRIPE_SECRET_KEY     → GitHub secret
      # ISG_AGENT_STRIPE_WEBHOOK_SECRET → GitHub secret
      # ISG_AGENT_SECRET_KEY            → GitHub secret
      ISG_AGENT_OPENAI_API_KEY: ${{ secrets.ISG_AGENT_OPENAI_API_KEY }}
      ISG_AGENT_ANTHROPIC_API_KEY: ${{ secrets.ISG_AGENT_ANTHROPIC_API_KEY }}
      ISG_AGENT_STRIPE_SECRET_KEY: ${{ secrets.ISG_AGENT_STRIPE_SECRET_KEY }}
      ISG_AGENT_STRIPE_WEBHOOK_SECRET: ${{ secrets.ISG_AGENT_STRIPE_WEBHOOK_SECRET }}
      ISG_AGENT_SECRET_KEY: ${{ secrets.ISG_AGENT_SECRET_KEY }}
      ISG_AGENT_DB_PATH: ":memory:"
      CI: "true"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check isg_agent/ tests/ --output-format=github

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -q \
            --tb=short \
            --timeout=60 \
            --cov=isg_agent \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=50

  # -------------------------------------------------------------------
  # Job 2: Frontend — install + vitest unit tests + lint + build
  # -------------------------------------------------------------------
  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run Vitest unit tests
        working-directory: frontend
        run: npm test
        env:
          CI: "true"

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          CI: "true"

  # -------------------------------------------------------------------
  # Job 3: Docker — verify both images build correctly
  # -------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dingdawg-agent1-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: dingdawg-agent1-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
