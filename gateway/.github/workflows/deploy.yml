name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # -------------------------------------------------------------------
  # Job 1: Build and push Docker images to GHCR
  # -------------------------------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # Job 2: Deploy (template — uncomment the provider you use)
  # -------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Option A: Railway (ACTIVE — configured for this project)
      # Required GitHub Secrets:
      #   RAILWAY_TOKEN              → from Railway project settings → Tokens
      #   AGENT1_RAILWAY_SERVICE_ID  → from Railway service settings URL
      #   AGENT1_BACKEND_URL         → https://api.dingdawg.com
      # ---------------------------------------------------------------
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.AGENT1_RAILWAY_SERVICE_ID }} --detach

      - name: Wait for deploy to settle
        run: sleep 30

      - name: Health check post-deploy
        run: |
          echo "Checking Agent 1 health endpoint..."
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.AGENT1_BACKEND_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check FAILED after 5 attempts"
          exit 1

      # ---------------------------------------------------------------
      # Option B: Fly.io
      # Prerequisites:
      #   1. Create a Fly.io app at https://fly.io
      #   2. Set FLY_API_TOKEN in GitHub Secrets
      #   3. Create fly.toml in project root
      #   4. Uncomment the block below
      # ---------------------------------------------------------------
      # - name: Install Fly CLI
      #   uses: superfly/flyctl-actions/setup-flyctl@master
      #
      # - name: Deploy to Fly.io
      #   env:
      #     FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      #   run: flyctl deploy --remote-only

      # ---------------------------------------------------------------
      # Option C: Render
      # Prerequisites:
      #   1. Create services at https://render.com
      #   2. Set RENDER_API_KEY and RENDER_SERVICE_ID in GitHub Secrets
      #   3. Uncomment the block below
      # ---------------------------------------------------------------
      # - name: Deploy to Render
      #   env:
      #     RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      #   run: |
      #     curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
      #       -H "Authorization: Bearer $RENDER_API_KEY"
      #     curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
      #       -H "Authorization: Bearer $RENDER_API_KEY"

      # ---------------------------------------------------------------
      # Option D: Docker Compose on a VPS (ssh deploy)
      # Prerequisites:
      #   1. Set SSH_HOST, SSH_USER, SSH_KEY in GitHub Secrets
      #   2. Ensure docker compose is available on the remote host
      #   3. Uncomment the block below
      # ---------------------------------------------------------------
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     script: |
      #       cd /opt/dingdawg-agent1
      #       docker compose pull
      #       docker compose up -d --remove-orphans

      - name: Deployment placeholder
        run: |
          echo "Images pushed to GHCR successfully."
          echo "Backend:  ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo ""
          echo "To deploy, uncomment one of the provider blocks above"
          echo "and configure the required secrets in GitHub Settings."
